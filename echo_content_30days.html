const weekTitles = {
  1: { label: "Week 1 — ปลุกความสนใจ (นาฬิกาเสียง)", cls: "wl-1" },
  2: { label: "Week 2 — สร้างความเชื่อ ระบบทำงานจริง", cls: "wl-2" },
  3: { label: "Week 3 — ดึงสองกลุ่มเป้าหมาย", cls: "wl-3" },
  4: { label: "Week 4 — ปิดการขายและขยายฐาน", cls: "wl-4" }
};

function filterWeek(week, btn) {
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', week !== 'all' && c.dataset.week !== week);
  });
  document.querySelectorAll('.week-section').forEach(s => {
    s.style.display = (week === 'all' || s.dataset.week === week) ? '' : 'none';
  });
}

function copyText(dayNum) {
  const post = posts.find(p => p.day === dayNum);
  navigator.clipboard.writeText(post.caption).then(() => {
    const btn = document.getElementById('copy-' + dayNum);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function render() {
  const container = document.getElementById('content');
  let html = '';
  let lastWeek = 0;

  posts.forEach(post => {
    if (post.week !== lastWeek) {
      if (lastWeek !== 0) html += '</div>';
      const wt = weekTitles[post.week];
      html += `<div class="week-section" data-week="${post.week}">
        <div class="week-label ${wt.cls}">${wt.label}</div>`;
      lastWeek = post.week;
    }

    html += `
      <div class="card w${post.week}" data-week="${post.week}">
        <div class="card-header">
          <span class="day-badge">DAY ${post.day} · ${post.title}</span>
          <button class="copy-btn" id="copy-${post.day}" onclick="copyText(${post.day})">COPY</button>
        </div>
        <div class="card-body">
          <div class="caption">${post.caption.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        </div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

render();
</script>
