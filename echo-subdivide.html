<title>เกลี่ยเม็ด · v2.1</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:radial-gradient(120% 70% at 50% 0%, #16203d 0%, #0B1020 55%, #05070f 100%);
       color:#EAEef7;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;padding:22px 16px 46px}
  .wrap{max-width:720px;margin:0 auto}
  .eyebrow{letter-spacing:3px;font-size:11px;color:#E8C547;text-transform:uppercase;text-align:center}
  h1{font-size:23px;font-weight:800;color:#fff;text-align:center;margin:6px 0 2px}
  .sub{text-align:center;color:#9aa6c2;font-size:13px;margin-bottom:8px;line-height:1.6}
  .def{text-align:center;color:#E8C547;font-size:12.5px;font-weight:700;margin-bottom:16px}

  .card{background:#0e1530;border:1.5px solid #1f2a4d;border-radius:16px;padding:13px 14px;margin-bottom:12px}
  .cardhead{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:4px}
  .cardhead .en{font-size:18px;font-weight:900}
  .cardhead .th{font-size:13px;color:#9aa6c2;font-weight:700}
  .lane{background:#fbfbf7;border-radius:12px;padding:8px 6px;margin:8px 0}
  .lane svg{display:block;margin:0 auto;width:100%;max-width:330px;height:auto}
  .laneInfo{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .tag{font-size:12.5px;font-weight:800;padding:4px 11px;border-radius:8px}
  .medbadge{font-size:13px;font-weight:900}
  .btn{padding:7px 16px;border-radius:999px;cursor:pointer;font-size:12.5px;font-weight:800;border:1.5px solid #2a3458;background:transparent;color:#cdd6ee}

  .compare{text-align:center;margin:8px 0 4px}
  .btn.big{padding:11px 22px;font-size:14px;background:#E8C547;color:#0B1020;border:none}
  .foot{text-align:center;color:#56607f;font-size:11px;margin-top:18px;line-height:1.8}
</style>

<body>
<div class="wrap">
  <p class="eyebrow" id="eyebrow"></p>
  <h1 id="h1"></h1>
  <p class="sub" id="sub"></p>
  <p class="def" id="def"></p>

  <div id="cards"></div>

  <div class="compare"><button class="btn big" id="cmpAll"></button></div>

  <p class="foot" id="foot"></p>
</div>

<script>
/* ===================== ชั้นภาษา (แยกข้อความไว้ที่เดียว เผื่อแปลภาษาอื่น) ===================== */
var TXT={
  eyebrow:"เสียงสะท้อนจากโมงยาม · v2.1 · เกลี่ยเม็ด",
  h1:"เกลี่ยเม็ด",
  sub:"หน่วยเวลาเดียวกัน · เกลี่ยให้ทุกเม็ดยาวเท่ากันได้หลายแบบ",
  def:"เกลี่ยเม็ด = แบ่งเวลาให้ทุกเม็ดยาวเท่ากัน",
  unit:"1 หน่วยเวลา (เท่ากันทุกแบบ)",
  parts:"เกลี่ยเป็น N ส่วนเท่ากัน",
  med:"N เม็ด",
  listen:"▶ ฟัง",
  compareAll:"▶ ฟังเทียบทั้งสาม",
  foot:"เดโม v2.1 · หน่วยเวลาเท่ากัน แต่จำนวนเม็ดต่างกัน · เม็ด = หน่วยนับ · Double/Triple/Quadruple = ชื่อวิธีเกลี่ย"
};
/* ===================== แก่นสากล (ไม่ผูกภาษา) ===================== */
var WAYS=[
  {en:"Double",    th:"ดับเบิล",     n:2, color:"#36C03F", tuplet:false},
  {en:"Triple",    th:"ทริปเปิล",    n:3, color:"#2E4FD4", tuplet:true},
  {en:"Quadruple", th:"ควอดรูเพิล", n:4, color:"#F5901E", tuplet:false}
];
function fill(t,n){return t.replace("N",n);}

/* ── วาด 1 หน่วยเวลา เกลี่ยเป็น n เม็ดเท่ากัน ── */
function laneSVG(n,color,tuplet){
  var W=330,H=112,x0=50,x1=280,span=x1-x0,by=78,stemTop=44,s="",i;
  /* วงเล็บบน = 1 หน่วยเวลา */
  var bracketY=16;
  s+='<line x1="'+x0+'" y1="'+bracketY+'" x2="'+x1+'" y2="'+bracketY+'" stroke="#9aa6c2" stroke-width="1.5"/>';
  s+='<line x1="'+x0+'" y1="'+bracketY+'" x2="'+x0+'" y2="'+(bracketY+5)+'" stroke="#9aa6c2" stroke-width="1.5"/>';
  s+='<line x1="'+x1+'" y1="'+bracketY+'" x2="'+x1+'" y2="'+(bracketY+5)+'" stroke="#9aa6c2" stroke-width="1.5"/>';
  s+='<text x="'+((x0+x1)/2)+'" y="'+(bracketY-4)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#888">'+TXT.unit+'</text>';
  /* baseline */
  s+='<line x1="'+(x0-14)+'" y1="'+by+'" x2="'+(x1+14)+'" y2="'+by+'" stroke="#d8d8cf" stroke-width="1.4"/>';
  /* เส้นแบ่งส่วนเท่ากัน (เน้นว่าเกลี่ยเท่ากัน) */
  for(i=0;i<=n;i++){var xb=x0+span*(i/n);s+='<line x1="'+xb+'" y1="'+(by-4)+'" x2="'+xb+'" y2="'+(by+9)+'" stroke="#c9c9c0" stroke-width="'+((i===0||i===n)?"1.6":"1")+'"/>';}
  /* หัวโน้ต + หาง + คานเชื่อม */
  var xs=[];for(i=0;i<n;i++)xs.push(x0+span*((i+0.5)/n));
  for(i=0;i<n;i++)s+='<line x1="'+(xs[i]+6.2)+'" y1="'+(by-1)+'" x2="'+(xs[i]+6.2)+'" y2="'+stemTop+'" stroke="'+color+'" stroke-width="2"/>';
  s+='<rect x="'+(xs[0]+6.2)+'" y="'+stemTop+'" width="'+(xs[n-1]-xs[0])+'" height="4.6" fill="'+color+'"/>';
  for(i=0;i<n;i++)s+='<ellipse cx="'+xs[i]+'" cy="'+by+'" rx="6.8" ry="5" fill="'+color+'" stroke="'+color+'" stroke-width="2" transform="rotate(-20 '+xs[i]+' '+by+')"/>';
  /* ปีกกา tuplet (เฉพาะที่กำหนด) = สัญลักษณ์เม็ดที่ผิดจากการแบ่งปกติ */
  if(tuplet){
    var a=xs[0]-9, b=xs[n-1]+9, ty=30, mx=(a+b)/2;
    s+='<line x1="'+a+'" y1="'+ty+'" x2="'+b+'" y2="'+ty+'" stroke="'+color+'" stroke-width="1.8"/>';
    s+='<line x1="'+a+'" y1="'+ty+'" x2="'+a+'" y2="'+(ty+6)+'" stroke="'+color+'" stroke-width="1.8"/>';
    s+='<line x1="'+b+'" y1="'+ty+'" x2="'+b+'" y2="'+(ty+6)+'" stroke="'+color+'" stroke-width="1.8"/>';
    s+='<rect x="'+(mx-9)+'" y="'+(ty-10)+'" width="18" height="17" fill="#fbfbf7"/>';
    s+='<text x="'+mx+'" y="'+(ty+3)+'" text-anchor="middle" font-size="14" font-weight="900" fill="'+color+'">'+n+'</text>';
  }
  /* ตัวเลขจำนวนเม็ด */
  s+='<circle cx="'+(x1+30)+'" cy="'+by+'" r="14" fill="'+color+'"/>';
  s+='<text x="'+(x1+30)+'" y="'+(by+5)+'" text-anchor="middle" font-size="15" font-weight="900" fill="#fff">'+n+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:330px;height:auto;display:block;margin:0 auto">'+s+'</svg>';
}

function render(){
  document.getElementById("eyebrow").textContent=TXT.eyebrow;
  document.getElementById("h1").textContent=TXT.h1;
  document.getElementById("sub").textContent=TXT.sub;
  document.getElementById("def").textContent=TXT.def;
  document.getElementById("cmpAll").textContent=TXT.compareAll;
  document.getElementById("foot").textContent=TXT.foot;
  var html="",i;
  for(i=0;i<WAYS.length;i++){
    var w=WAYS[i];
    html+='<div class="card">';
    html+='<div class="cardhead"><span class="en" style="color:'+w.color+'">'+w.en+'</span><span class="th">'+w.th+'</span></div>';
    html+='<div class="lane">'+laneSVG(w.n,w.color,w.tuplet)+'</div>';
    html+='<div class="laneInfo">';
    html+='<span class="tag" style="background:'+w.color+'22;color:'+w.color+';border:1px solid '+w.color+'">'+fill(TXT.parts,w.n)+'</span>';
    html+='<span class="medbadge" style="color:'+w.color+'">'+fill(TXT.med,w.n)+'</span>';
    html+='<button class="btn" data-n="'+w.n+'" style="border-color:'+w.color+';color:'+w.color+'">'+TXT.listen+'</button>';
    html+='</div></div>';
  }
  document.getElementById("cards").innerHTML=html;
}

/* ── เสียง ── */
var ac=null;
function ensureAC(){if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();}
function noteTone(when,dur){
  var t=ac.currentTime+when,o=ac.createOscillator(),g=ac.createGain();
  o.type="triangle";o.frequency.value=523.25;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur);
}
function clickTone(when){
  var t=ac.currentTime+when,o=ac.createOscillator(),g=ac.createGain();
  o.type="square";o.frequency.value=1700;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.07,t+0.004);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.06);
}
/* เกลี่ย n เม็ดเท่ากัน ในเวลา dur เริ่มที่ start */
function playEqual(n,start,dur){
  var nd=dur/n,i;
  clickTone(start); /* จุดเริ่มหน่วยเวลา */
  for(i=0;i<n;i++)noteTone(start+i*nd,nd*0.9);
}
function playOne(n){ensureAC();playEqual(n,0,1.3);}
function playCompare(){
  ensureAC();
  var dur=1.2,gap=0.5,i,start=0;
  for(i=0;i<WAYS.length;i++){playEqual(WAYS[i].n,start,dur);start+=dur+gap;}
}

document.getElementById("cards").addEventListener("click",function(e){
  var pb=e.target.closest("[data-n]");
  if(pb)playOne(parseInt(pb.getAttribute("data-n"),10));
});
document.getElementById("cmpAll").onclick=playCompare;

render();
</script>
